<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StarX Medic · Selecciona portal</title>
  <style>
    :root { --bg:#01030a; --panel:#081225; --text:#f5f7ff; --muted:rgba(245,247,255,0.6); --accent:#3dd5ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at top, rgba(61,213,255,0.15), transparent 60%), var(--bg); font-family:"Space Grotesk","Segoe UI",sans-serif; color:var(--text); display:flex; justify-content:center; align-items:center; padding:40px 20px; overflow-y:auto; }
    main { width:min(900px,100%); text-align:center; }
    .symbol { width:160px; height:160px; margin:0 auto 16px; position:relative; border-radius:30px; display:flex; align-items:center; justify-content:center; font-size:52px; letter-spacing:0.5rem; text-transform:uppercase; color:#0c1428; animation:float 6s ease-in-out infinite, spin 30s linear infinite; transform-style:preserve-3d; }
    .symbol::before,
    .symbol::after { content:""; position:absolute; inset:0; border-radius:30px; background:linear-gradient(135deg, rgba(61,213,255,0.95), rgba(16,94,255,0.55)); box-shadow:0 20px 60px rgba(61,213,255,0.35); transform:translateZ(-15px); }
    .symbol::after { inset:14px; background:rgba(2,5,13,0.85); box-shadow:inset 0 0 30px rgba(61,213,255,0.35); transform:translateZ(25px); }
    .symbol span { position:relative; z-index:2; color:var(--text); font-weight:600; }
    h1 { text-align:center; text-transform:uppercase; letter-spacing:0.35rem; font-weight:400; margin-bottom:6px; }
    p { text-align:center; color:var(--muted); letter-spacing:0.12rem; margin-bottom:32px; }
    .portal-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }
    .portal-card { border:none; border-radius:26px; padding:28px; background:linear-gradient(135deg, rgba(17,70,120,0.95), rgba(12,150,195,0.95)); box-shadow:0 30px 90px rgba(12,150,195,0.45); text-decoration:none; color:var(--text); position:relative; overflow:hidden; transform:translateY(0); transition:transform 0.25s ease, box-shadow 0.25s ease; display:flex; flex-direction:column; gap:8px; }
    .portal-card:nth-child(2) { background:linear-gradient(135deg, rgba(120,49,190,0.95), rgba(28,15,60,0.95)); box-shadow:0 30px 90px rgba(120,49,190,0.45); }
    .portal-card::after { content:""; position:absolute; inset:-40% -10%; background:radial-gradient(circle at center, rgba(255,255,255,0.3), transparent 60%); opacity:0.4; animation:flow 6s linear infinite; }
    .portal-card:hover { transform:translateY(-6px); box-shadow:0 40px 110px rgba(12,150,195,0.6); }
    .portal-card span { position:relative; z-index:1; font-size:12px; letter-spacing:0.35rem; text-transform:uppercase; color:rgba(255,255,255,0.8); }
    .portal-card h2 { position:relative; z-index:1; margin:0; font-size:28px; letter-spacing:0.2rem; text-transform:uppercase; }
    .portal-card p { position:relative; z-index:1; margin:0; font-size:13px; letter-spacing:0.12rem; color:rgba(255,255,255,0.75); }
    .portal-card span { position:relative; z-index:1; display:block; font-size:14px; letter-spacing:0.2rem; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .portal-card h2 { position:relative; z-index:1; margin:0 0 12px; font-size:26px; letter-spacing:0.2rem; }
    .portal-card p { position:relative; z-index:1; text-align:left; margin:0; color:var(--muted); }
    @keyframes flow { 0% { transform:translateX(-20%); } 100% { transform:translateX(20%); } }
    @keyframes spin { 0% { transform:rotateY(0deg); } 100% { transform:rotateY(360deg); } }
    @keyframes float { 0%,100% { transform:translateY(-6px); } 50% { transform:translateY(6px); } }
  </style>
</head>
<body>
  <main>
    <div class="symbol"><span>S</span></div>
    <h1>Selecciona el portal que necesitas</h1>
    <p>Elige cómo quieres usar StarX hoy mismo</p>
    <div class="portal-grid">
      <a class="portal-card" href="/paciente.html">
        <span>Uso libre</span>
        <h2>Portal Paciente</h2>
        <p>Registrar eventos, guardar resultados y compartirlos cuando quieras.</p>
      </a>
      <a class="portal-card" href="/medico.html">
        <span>Profesionales</span>
        <h2>Portal Profesional</h2>
        <p>Médicos y equipos de salud con panel vivo para pacientes y comandos diarios.</p>
      </a>
    </div>
  </main>
</body>
</html>
