<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>StarX Core OS</title>
  <style>
    :root {
      --bg:#01030a;
      --panel:#070f1e;
      --border:rgba(255,255,255,0.08);
      --text:#ecf3ff;
      --muted:rgba(236,243,255,0.6);
      --accent:#3dd5ff;
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at top, rgba(61,213,255,0.18), transparent 60%), var(--bg); font-family:"Space Grotesk","Segoe UI",sans-serif; color:var(--text); display:flex; justify-content:center; padding:60px 20px; }
    main { width:100%; max-width:1100px; }
    header { margin-bottom:40px; display:flex; flex-direction:column; gap:6px; }
    h1 { margin:0; text-transform:uppercase; letter-spacing:0.4rem; font-weight:300; }
    .subtitle { text-transform:uppercase; letter-spacing:0.3rem; font-size:13px; color:var(--muted); }
    .status { display:flex; align-items:center; gap:10px; font-size:12px; letter-spacing:0.2rem; text-transform:uppercase; color:var(--muted); }
    .status span { width:10px; height:10px; border-radius:50%; background:#7cffb4; box-shadow:0 0 12px rgba(124,255,180,0.9); animation:pulse 3.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform:scale(0.9); box-shadow:0 0 6px rgba(124,255,180,0.5); } 50% { transform:scale(1.2); box-shadow:0 0 16px rgba(124,255,180,1); } }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:22px; }
    .module { position:relative; padding:32px 24px 60px; border:1px solid var(--border); border-radius:30px; background:var(--panel); min-height:230px; cursor:pointer; transition:transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease; overflow:hidden; }
    .module:hover { transform:translateY(-6px); border-color:rgba(61,213,255,0.4); box-shadow:0 20px 60px rgba(0,0,0,0.45); }
    .cube { width:96px; height:96px; margin-bottom:28px; position:relative; display:flex; align-items:center; justify-content:center; font-size:26px; letter-spacing:0.4rem; font-weight:600; text-transform:uppercase; }
    .cube::before, .cube::after { content:""; position:absolute; inset:0; border-radius:24px; }
    .cube::before { background:linear-gradient(135deg, rgba(61,213,255,0.35), rgba(61,213,255,0.05)); border:1px solid rgba(61,213,255,0.3); }
    .cube::after { inset:12px; background:rgba(0,0,0,0.6); }
    .cube span { position:relative; z-index:1; }
    .module h2 { margin:0; font-size:18px; letter-spacing:0.25rem; text-transform:uppercase; }
    .module p { margin:8px 0 0; font-size:13px; letter-spacing:0.2rem; text-transform:uppercase; color:var(--muted); }
    .module[data-kind="starx"] .cube::before { background:linear-gradient(135deg, rgba(61,213,255,0.65), rgba(61,213,255,0.25)); }
    .module[data-kind="wayruru"] .cube::before { background:linear-gradient(135deg, rgba(255,111,145,0.65), rgba(255,150,113,0.25)); }
    .module[data-kind="ofy"] .cube::before { background:linear-gradient(135deg, rgba(26,107,77,0.6), rgba(79,179,123,0.25)); }
    .module[data-kind="powder"] .cube::before { background:linear-gradient(135deg, rgba(255,193,7,0.6), rgba(255,179,0,0.25)); }
    .jarvis { position:fixed; right:30px; bottom:30px; padding:16px 32px; border-radius:999px; background:rgba(61,213,255,0.18); border:1px solid rgba(61,213,255,0.35); color:var(--text); text-transform:uppercase; letter-spacing:0.3rem; font-size:12px; cursor:pointer; backdrop-filter:blur(10px); box-shadow:0 15px 40px rgba(0,0,0,0.35); }
    .jarvis-panel { position:fixed; right:30px; bottom:100px; width:320px; height:420px; border-radius:30px; border:1px solid rgba(255,255,255,0.08); background:rgba(4,8,16,0.92); box-shadow:0 20px 60px rgba(0,0,0,0.5); display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity 0.3s ease, transform 0.3s ease; transform:translateY(20px); }
    .subscription-overlay { position:absolute; inset:0; background:rgba(1,3,10,0.92); border-radius:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:18px; padding:40px; }
    .subscription-overlay h3 { margin:0; font-size:20px; letter-spacing:0.3rem; text-transform:uppercase; }
    .subscription-overlay p { margin:0; font-size:13px; letter-spacing:0.18rem; text-transform:uppercase; color:var(--muted); }
    .subscription-overlay button { padding:14px 32px; border:none; border-radius:999px; background:rgba(61,213,255,0.3); color:var(--text); text-transform:uppercase; letter-spacing:0.25rem; font-size:12px; cursor:pointer; }
    .subscription-overlay small { font-size:12px; color:rgba(236,243,255,0.55); letter-spacing:0.12rem; }
  

    param($m)

    "<style>`n$($m.Groups[1].Value)`n</style>`n<body>"


  <main>
    <header>
      <h1>StarX Core</h1>
      <div class="subtitle">Sistema operativo empresarial</div>
      <div class="status"><span></span>System Live</div>
    </header>
    <section class="grid" id="core-grid">
      <article class="module" data-kind="starx" data-href="/entrar.html">
        <div class="cube"><span>S</span></div>
        <h2>StarX Core</h2>
        <p>Online</p>
      </article>
      <article class="module" data-kind="wayruru" data-href="/wayruru.html">
        <div class="cube"><span>W</span></div>
        <h2>Wayruru</h2>
        <p>Online</p>
      </article>
      <article class="module" data-kind="ofy" data-href="/ofy.html">
        <div class="cube"><span>FC</span></div>
        <h2>OFY</h2>
        <p>Online</p>
      </article>
      <article class="module" data-kind="powder" data-href="/powderbulk.html">
        <div class="cube"><span>P&amp;B</span></div>
        <h2>Powder &amp; Bulk</h2>
        <p>Online</p>
      </article>
    </section>
    <div class="subscription-overlay" id="subscription-overlay" style="display:none;">
      <h3>Activa tu sistema</h3>
      <p id="subscription-copy">Necesitas un plan vigente para continuar</p>
      <button id="activate-plan">Activar</button>
      <small id="subscription-note"></small>
    </div>
  </main>
  <button class="jarvis" id="jarvis-toggle">Jarvis</button>
  <aside class="jarvis-panel" id="jarvis-panel">
    <div class="jarvis-head">
      <span>Jarvis Bot</span>
      <button id="jarvis-close" style="background:none;border:none;color:var(--text);font-size:16px;cursor:pointer;">×</button>
    </div>
    <div class="jarvis-messages" id="jarvis-messages"></div>
    <form class="jarvis-input" id="jarvis-form">
      <input type="text" id="jarvis-command" placeholder="Escribe un comando" autocomplete="off" />
      <button type="submit">Enviar</button>
    </form>
  </aside>
  <script>
    const API_BASE = "https://api.starxmedic.com";
    const token = localStorage.getItem("starx_token");
    if (!token) {
      window.location.href = "/acceso.html";
    }

    const request = async (path, options = {}) => {
      const headers = options.headers ? { ...options.headers } : {};
      headers["Authorization"] = `Bearer ${token}`;
      if (options.body && !headers["Content-Type"]) {
        headers["Content-Type"] = "application/json";
      }
      const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
      if (res.status === 401) {
        localStorage.removeItem("starx_token");
        window.location.href = "/acceso.html";
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) {
        throw new Error(data.error || data.message || "Error inesperado");
      }
      return data;
    };

    document.querySelectorAll(".module").forEach((module) => {
      module.addEventListener("click", () => {
        const target = module.dataset.href;
        if (target) window.location.href = target;
      });
    });

    const grid = document.getElementById("core-grid");
    const overlay = document.getElementById("subscription-overlay");
    const activateBtn = document.getElementById("activate-plan");
    const subscriptionCopy = document.getElementById("subscription-copy");
    const subscriptionNote = document.getElementById("subscription-note");

    let currentSubscription = null;
    let statsCache = null;

    const renderSubscriptionState = () => {
      const active = currentSubscription && currentSubscription.status === "active";
      if (!active) {
        overlay.style.display = "flex";
        grid.style.filter = "blur(4px)";
        grid.style.pointerEvents = "none";
      } else {
        overlay.style.display = "none";
        grid.style.filter = "none";
        grid.style.pointerEvents = "auto";
      }
    };

    const loadSubscription = async () => {
      try {
        subscriptionCopy.textContent = "Verificando tu plan";
        subscriptionNote.textContent = "";
        const response = await request("/my-subscription");
        currentSubscription = response.subscription;
        if (currentSubscription && currentSubscription.status === "active") {
          subscriptionCopy.textContent = "Plan activo";
          subscriptionNote.textContent = currentSubscription.plan.toUpperCase();
        } else {
          subscriptionCopy.textContent = "Necesitas un plan vigente para continuar";
          subscriptionNote.textContent = "";
        }
      } catch (error) {
        subscriptionCopy.textContent = "No se pudo verificar la suscripción";
        subscriptionNote.textContent = error.message;
        currentSubscription = null;
      }
      renderSubscriptionState();
    };

    const subscribeBasic = async () => {
      activateBtn.disabled = true;
      activateBtn.textContent = "Activando...";
      subscriptionNote.textContent = "";
      try {
        const response = await request("/subscribe", {
          method: "POST",
          body: JSON.stringify({ plan: "basic" })
        });
        currentSubscription = response.subscription;
        subscriptionCopy.textContent = "Plan activado";
        subscriptionNote.textContent = currentSubscription.plan.toUpperCase();
      } catch (error) {
        subscriptionCopy.textContent = "No se pudo activar";
        subscriptionNote.textContent = error.message;
      } finally {
        activateBtn.disabled = false;
        activateBtn.textContent = "Activar";
        renderSubscriptionState();
      }
    };

    activateBtn.addEventListener("click", subscribeBasic);

    loadSubscription();

    const fetchStats = async (force = false) => {
      if (!force && statsCache) return statsCache;
      const data = await request("/stats");
      statsCache = data;
      return data;
    };

    const jarvisToggle = document.getElementById("jarvis-toggle");
    const jarvisPanel = document.getElementById("jarvis-panel");
    const jarvisClose = document.getElementById("jarvis-close");
    const messagesEl = document.getElementById("jarvis-messages");
    const form = document.getElementById("jarvis-form");
    const input = document.getElementById("jarvis-command");

    const togglePanel = (open) => {
      if (open) {
        jarvisPanel.classList.add("open");
        input.focus();
      } else {
        jarvisPanel.classList.remove("open");
      }
    };

    jarvisToggle.addEventListener("click", () => togglePanel(!jarvisPanel.classList.contains("open")));
    jarvisClose.addEventListener("click", () => togglePanel(false));

    const addMessage = (sender, text) => {
      const bubble = document.createElement("div");
      bubble.className = `bubble ${sender === "me" ? "me" : "bot"}`;
      bubble.textContent = text;
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    };

    const handleCommand = async (command) => {
      const cmd = command.trim().toLowerCase();
      if (!cmd) return;
      if (cmd === "estado") {
        const plan = currentSubscription ? `${currentSubscription.plan.toUpperCase()} (${currentSubscription.status})` : "sin plan";
        addMessage("bot", `Sistema activo ▸ Plan ${plan}`);
        return;
      }
      if (cmd === "modulos") {
        addMessage("bot", "StarX, Wayruru, OFY, Powder");
        return;
      }
      if (cmd === "usuarios" || cmd === "eventos" || cmd === "links" || cmd === "suscripciones") {
        try {
          const stats = await fetchStats();
          if (cmd === "usuarios") addMessage("bot", `Usuarios totales: ${stats.users_total ?? 0}`);
          if (cmd === "eventos") addMessage("bot", `Eventos clínicos: ${stats.events_total ?? 0}`);
          if (cmd === "links") addMessage("bot", `Vínculos doctor-paciente: ${stats.links_total ?? 0}`);
          if (cmd === "suscripciones") addMessage("bot", `Suscripciones: ${stats.subscriptions_total ?? 0}`);
        } catch (error) {
          addMessage("bot", "No se pudo obtener las métricas.");
        }
        return;
      }
      if (cmd === "colony") {
        addMessage("bot", "Consultando COLONY...");
        try {
          const res = await fetch(`${API_BASE}/colony/status`);
          const data = await res.json();
          if (!data.ok) throw new Error("Estado no disponible");
          addMessage(
            "bot",
            `Colony ▸ Nodos: ${data.nodes_total} · Señales: ${data.signals_total} · Estado: ${data.status}`
          );
        } catch (error) {
          addMessage("bot", "No se pudo obtener el estado de COLONY.");
        }
        return;
      }
      addMessage("bot", "Comando no reconocido. Usa: estado, modulos, colony.");
    };

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const value = input.value.trim();
      if (!value) return;
      addMessage("me", value);
      input.value = "";
      handleCommand(value);
    });
  </script>
</body>
</html>
