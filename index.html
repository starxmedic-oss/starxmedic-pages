<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarX</title>
  <style>
    :root {
      --bg:#01040b;
      --glow:#38bdf8;
      --text:#f9fbff;
      --muted:rgba(249,251,255,0.55);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at top, rgba(56,189,248,0.12), transparent 55%), var(--bg);
      font-family:"Space Grotesk", "Segoe UI", system-ui, sans-serif;
      color:var(--text);
    }
    .shell {
      text-align:center;
      padding:60px 40px;
      border:1px solid rgba(248,250,255,0.08);
      border-radius:32px;
      background:rgba(1,4,11,0.75);
      box-shadow:0 0 120px rgba(56,189,248,0.12);
    }
    .symbol {
      width:78px;
      height:78px;
      margin:0 auto 24px;
      border:1px solid rgba(248,250,255,0.2);
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      letter-spacing:2px;
      color:var(--glow);
    }
    h1 {
      margin:0 0 8px;
      font-size:48px;
      letter-spacing:0.2rem;
      text-transform:uppercase;
    }
    p {
      margin:0 0 32px;
      color:var(--muted);
      font-size:18px;
      letter-spacing:0.1rem;
    }
    .actions {
      display:flex;
      gap:16px;
      justify-content:center;
      flex-wrap:wrap;
    }
    a {
      text-decoration:none;
      text-transform:uppercase;
      letter-spacing:0.15rem;
      font-size:14px;
    }
    .primary {
      padding:14px 32px;
      border-radius:999px;
      background:linear-gradient(120deg,rgba(56,189,248,0.9),rgba(14,165,233,0.9));
      color:#01040b;
      font-weight:600;
    }
    .ghost {
      padding:12px 28px;
      border-radius:999px;
      border:1px solid rgba(248,250,255,0.18);
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="symbol">S</div>
    <h1>StarX</h1>
    <p>plataforma clínica hiperfuturista</p>
    <div class="actions">
      <a class="primary" href="/entrar">Entrar</a>
      <a class="ghost" href="/premium">Premium</a>
    </div>
  </main>
</body>
</html>
