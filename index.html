<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarX</title>
  <style>
    :root { --bg:#01030b; --text:#eef3ff; --muted:rgba(238,243,255,0.65); --accent:#3dd5ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at top, rgba(61,213,255,0.12), transparent 55%), var(--bg); font-family:"Space Grotesk","Segoe UI",sans-serif; color:var(--text); }
    main { text-align:center; padding:80px 60px; border:1px solid rgba(255,255,255,0.08); border-radius:36px; background:rgba(1,3,11,0.8); box-shadow:0 0 160px rgba(61,213,255,0.18); }
    .symbol { width:82px; height:82px; margin:0 auto 24px; border:1px solid rgba(255,255,255,0.15); border-radius:24px; display:flex; align-items:center; justify-content:center; font-size:40px; letter-spacing:0.2rem; color:var(--accent); }
    h1 { margin:0 0 12px; font-size:44px; letter-spacing:0.4rem; text-transform:uppercase; }
    p { margin:0 0 32px; font-size:18px; letter-spacing:0.12rem; color:var(--muted); }
    a { text-decoration:none; display:inline-flex; padding:16px 36px; border-radius:999px; background:linear-gradient(120deg,rgba(61,213,255,0.95),rgba(14,165,233,0.95)); color:#01040b; text-transform:uppercase; letter-spacing:0.25rem; font-weight:600; font-size:14px; }
  </style>
</head>
<body>
  <main>
    <div class="symbol">S</div>
    <h1>StarX</h1>
    <p>Sistema Tecnológico Avanzado para Registro clínico inteligente</p>
    <p style="margin-top:-12px; color:var(--muted); font-size:15px;">Plataforma clínica minimalista y futurista</p>
    <a href="/acceso">Entrar</a>
  </main>
</body>
</html>
