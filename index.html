<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarX</title>
  <style>
    :root { --bg:#00040c; --text:#eef3ff; --muted:rgba(238,243,255,0.75); --accent:#3dd5ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at top, rgba(61,213,255,0.18), transparent 60%), var(--bg); font-family:"Space Grotesk","Segoe UI",sans-serif; color:var(--text); }
    main { text-align:center; padding:90px 70px; border:1px solid rgba(255,255,255,0.05); border-radius:40px; background:rgba(0,4,12,0.75); box-shadow:0 0 200px rgba(61,213,255,0.22); }
    .symbol {
      width:140px;
      height:140px;
      margin:0 auto 32px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#0c1428;
      font-size:52px;
      letter-spacing:0.4rem;
      font-weight:600;
      text-transform:uppercase;
      animation:float 6s ease-in-out infinite, spin 30s linear infinite;
      transform-style:preserve-3d;
    }
    .symbol::before,
    .symbol::after {
      content:"";
      position:absolute;
      inset:0;
      border-radius:24px;
      background:linear-gradient(135deg, rgba(61,213,255,0.95), rgba(16,94,255,0.55));
      filter:blur(0px);
      box-shadow:0 20px 60px rgba(61,213,255,0.35);
      transform:translateZ(-15px);
    }
    .symbol::after {
      inset:14px;
      background:rgba(2,5,13,0.85);
      box-shadow:inset 0 0 30px rgba(61,213,255,0.35);
      transform:translateZ(25px);
    }
    .symbol span { position:relative; z-index:2; color:var(--text); }
    @keyframes float {
      0%,100% { transform:translateY(-6px); }
      50% { transform:translateY(6px); }
    }
    @keyframes spin {
      0% { transform:rotateX(0deg) rotateY(0deg); }
      100% { transform:rotateX(360deg) rotateY(360deg); }
    }
    h1 { margin:0 0 12px; font-size:48px; letter-spacing:0.4rem; text-transform:uppercase; }
    p { margin:0 0 40px; font-size:20px; letter-spacing:0.12rem; color:var(--muted); }
    a { text-decoration:none; display:inline-flex; padding:16px 40px; border-radius:999px; background:linear-gradient(120deg,rgba(61,213,255,0.95),rgba(14,165,233,0.95)); color:#01040b; text-transform:uppercase; letter-spacing:0.25rem; font-weight:600; font-size:14px; }
    .status { margin:18px auto 4px; display:inline-flex; align-items:center; gap:8px; padding:6px 18px; border-radius:999px; font-size:13px; letter-spacing:0.25rem; text-transform:uppercase; color:rgba(232,255,238,0.8); background:rgba(22,255,126,0.08); border:1px solid rgba(22,255,126,0.2); animation:pulse 4s ease-in-out infinite; }
    .dot { width:10px; height:10px; border-radius:50%; background:#16ff7e; box-shadow:0 0 12px rgba(22,255,126,0.8); }
    @keyframes pulse { 0%,100% { opacity:0.75; border-color:rgba(22,255,126,0.2); } 50% { opacity:1; border-color:rgba(22,255,126,0.35); } }
    .tagline { margin-top:14px; letter-spacing:0.25rem; font-size:12px; text-transform:uppercase; color:rgba(238,243,255,0.5); }
  </style>
</head>
<body>
  <main>
    <div class="symbol"><span>S</span></div>
    <h1>StarX</h1>
    <p>Sistema Tecnológico Avanzado para Registro clínico inteligente</p>
    <a href="/acceso">Entrar</a>
    <div class="status">
      <span class="dot"></span>
      System Live
    </div>
    <div class="tagline">Advanced Clinical Technology</div>
  </main>
</body>
</html>
