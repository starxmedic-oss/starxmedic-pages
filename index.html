<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarX</title>
  <style>
    :root { --bg:#00040c; --text:#eef3ff; --muted:rgba(238,243,255,0.75); --accent:#3dd5ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); font-family:"Space Grotesk","Segoe UI",sans-serif; color:var(--text); position:relative; overflow:hidden; }
    body::before {
      content:"";
      position:fixed;
      inset:-20%;
      background:radial-gradient(circle at 20% 20%, rgba(61,213,255,0.22), transparent 45%), radial-gradient(circle at 70% 0%, rgba(14,165,233,0.18), transparent 50%);
      filter:blur(60px);
      opacity:0.25;
      animation:ambient 16s ease-in-out infinite;
      pointer-events:none;
    }
    body::after {
      content:"";
      position:fixed;
      inset:-30%;
      background:radial-gradient(circle at 80% 80%, rgba(61,213,255,0.15), transparent 55%);
      filter:blur(80px);
      opacity:0.15;
      animation:ambient 22s ease-in-out infinite reverse;
      pointer-events:none;
    }
    @keyframes ambient {
      0%,100% { transform:scale(1); opacity:0.2; }
      50% { transform:scale(1.04); opacity:0.35; }
    }
    main { text-align:center; padding:90px 70px; border:1px solid rgba(255,255,255,0.05); border-radius:40px; background:rgba(0,4,12,0.75); box-shadow:0 0 200px rgba(61,213,255,0.22); position:relative; z-index:1; }
    .symbol {
      width:170px;
      height:170px;
      margin:0 auto 40px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#0c1428;
      font-size:62px;
      letter-spacing:0.5rem;
      font-weight:600;
      text-transform:uppercase;
      animation:float 6s ease-in-out infinite, spin 30s linear infinite;
      transform-style:preserve-3d;
    }
    .symbol::before,
    .symbol::after {
      content:"";
      position:absolute;
      inset:0;
      border-radius:24px;
      background:linear-gradient(135deg, rgba(61,213,255,0.95), rgba(16,94,255,0.55));
      filter:blur(0px);
      box-shadow:0 20px 60px rgba(61,213,255,0.35);
      transform:translateZ(-15px);
    }
    .symbol::after {
      inset:14px;
      background:rgba(2,5,13,0.85);
      box-shadow:inset 0 0 30px rgba(61,213,255,0.35);
      transform:translateZ(25px);
    }
    .symbol span { position:relative; z-index:2; color:var(--text); }
    @keyframes float {
      0%,100% { transform:translateY(-6px); }
      50% { transform:translateY(6px); }
    }
    @keyframes spin {
      0% { transform:rotateX(0deg) rotateY(0deg); }
      100% { transform:rotateX(360deg) rotateY(360deg); }
    }
    h1 { margin:0 0 8px; font-size:32px; letter-spacing:0.45rem; text-transform:uppercase; font-weight:300; }
    p { margin:0 0 26px; font-size:14px; letter-spacing:0.22rem; color:rgba(238,243,255,0.55); text-transform:uppercase; }
    a { text-decoration:none; display:inline-flex; padding:16px 40px; border-radius:999px; background:linear-gradient(120deg,rgba(61,213,255,0.95),rgba(14,165,233,0.95)); color:#01040b; text-transform:uppercase; letter-spacing:0.25rem; font-weight:600; font-size:14px; margin-bottom:26px; }
    .status { margin:34px auto 34px; display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:50%; background:rgba(22,255,126,0.08); border:1px solid rgba(22,255,126,0.2); animation:pulse 4s ease-in-out infinite; }
    .dot { width:12px; height:12px; border-radius:50%; background:#16ff7e; box-shadow:0 0 15px rgba(22,255,126,0.8); }
    @keyframes pulse { 0%,100% { opacity:0.75; border-color:rgba(22,255,126,0.2); } 50% { opacity:1; border-color:rgba(22,255,126,0.35); } }
    .tagline { margin-top:14px; letter-spacing:0.25rem; font-size:12px; text-transform:uppercase; color:rgba(238,243,255,0.5); }
  </style>
</head>
<body>
  <main>
    <div class="symbol"><span>S</span></div>
    <h1>StarX</h1>
    <p>Sistema Tecnológico Avanzado para Registro clínico inteligente</p>
    <div class="status">
      <span class="dot"></span>
      System Live
    </div>
    <a href="/acceso">Entrar</a>
    <div class="tagline">Advanced Clinical Technology</div>
  </main>
</body>
</html>
