<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal Profesional | StarX Medic</title>
  <style>
    :root { --bg:#01030a; --text:#f5f7ff; --muted:rgba(245,247,255,0.65); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:radial-gradient(circle at top, rgba(61,213,255,0.14), transparent 60%), #00040c; color:var(--text); font-family:"Space Grotesk","Segoe UI",sans-serif; display:flex; justify-content:center; align-items:center; padding:24px; }
    main { width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; gap:18px; }
    .hero-symbol { width:140px; height:140px; border-radius:30px; display:flex; align-items:center; justify-content:center; font-size:42px; letter-spacing:0.4rem; text-transform:uppercase; color:#031125; position:relative; animation:float 6s ease-in-out infinite, spin 30s linear infinite; transform-style:preserve-3d; }
    .hero-symbol::before,
    .hero-symbol::after { content:""; position:absolute; inset:0; border-radius:30px; background:linear-gradient(135deg, rgba(61,213,255,0.95), rgba(16,94,255,0.55)); box-shadow:0 20px 60px rgba(61,213,255,0.35); transform:translateZ(-15px); }
    .hero-symbol::after { inset:14px; background:rgba(2,5,13,0.85); box-shadow:inset 0 0 30px rgba(61,213,255,0.35); transform:translateZ(25px); }
    .hero-symbol span { position:relative; z-index:2; }
    .radial-shell { position:relative; width:320px; height:320px; max-width:90vw; max-height:90vw; }
    .radial-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:150px; height:150px; border-radius:50%; border:none; background:linear-gradient(135deg, rgba(61,213,255,0.95), rgba(123,60,255,0.9)); color:#021024; font-size:64px; cursor:pointer; box-shadow:0 40px 120px rgba(61,213,255,0.45); text-shadow:0 0 20px rgba(255,255,255,0.5); }
    .radial-node { position:absolute; width:110px; height:110px; border-radius:50%; border:none; background:linear-gradient(135deg, rgba(10,30,60,0.9), rgba(25,90,150,0.9)); color:var(--text); text-transform:uppercase; letter-spacing:0.2rem; font-size:11px; cursor:pointer; box-shadow:0 25px 70px rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; }
    .node-a { top:10%; left:5%; }
    .node-b { top:10%; right:5%; }
    .node-c { bottom:5%; left:50%; transform:translateX(-50%); }
    .modal { position:fixed; inset:0; display:none; align-items:center; justify-content:center; }
    .modal.active { display:flex; }
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); opacity:0; pointer-events:none; transition:opacity 0.3s ease; }
    .overlay.active { opacity:1; pointer-events:auto; }
    .modal-card { width:90%; max-width:420px; background:rgba(4,10,22,0.95); border-radius:20px; padding:24px; border:1px solid rgba(61,213,255,0.2); box-shadow:0 40px 120px rgba(0,0,0,0.6); }
    .modal-card h2 { margin:0 0 16px; letter-spacing:0.3rem; text-transform:uppercase; font-size:16px; }
    label { display:block; margin:12px 0 6px; letter-spacing:0.15rem; text-transform:uppercase; font-size:11px; color:var(--muted); }
    input, textarea { width:100%; border:1px solid rgba(255,255,255,0.15); border-radius:12px; padding:12px; background:rgba(4,8,16,0.9); color:var(--text); }
    textarea { resize:none; }
    .modal-card button[type="submit"] { width:100%; margin-top:20px; border:none; border-radius:999px; padding:12px; background:linear-gradient(120deg, rgba(61,213,255,0.95), rgba(123,60,255,0.95)); color:#01040b; text-transform:uppercase; letter-spacing:0.2rem; cursor:pointer; }
    .toast { margin-top:12px; text-align:center; font-size:12px; letter-spacing:0.15rem; color:var(--muted); min-height:16px; }
    @keyframes spin { 0% { transform:rotateX(0deg) rotateY(0deg); } 100% { transform:rotateX(360deg) rotateY(360deg); } }
    @keyframes float { 0%,100% { transform:translateY(-6px); } 50% { transform:translateY(6px); } }
    @media (max-width:480px) {
      body { padding:16px; }
      .radial-shell { width:260px; height:260px; }
      .radial-center { width:120px; height:120px; font-size:52px; }
      .radial-node { width:88px; height:88px; font-size:10px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero-symbol"><span>S</span></div>
    <section class="radial-shell">
      <button class="radial-center" id="quick-add">+</button>
      <button class="radial-node node-a">Pacientes</button>
      <button class="radial-node node-b">Resultados</button>
      <button class="radial-node node-c">Pendientes</button>
    </section>
  </main>

  <div class="overlay" id="quick-overlay"></div>
  <div class="modal" id="quick-modal">
    <form class="modal-card" id="quick-form">
      <h2>Registro rápido</h2>
      <label for="patient-name">Paciente</label>
      <input id="patient-name" type="text" placeholder="Nombre / código" required />
      <label for="patient-event">¿Qué ocurre?</label>
      <textarea id="patient-event" rows="2" placeholder="Motivo o evento" required></textarea>
      <label for="patient-plan">Conducta / indicación</label>
      <textarea id="patient-plan" rows="2" placeholder="Tratamiento, conducta o indicación" required></textarea>
      <label for="patient-next">Pendiente</label>
      <input id="patient-next" type="text" placeholder="Próxima acción" />
      <button type="submit">Guardar registro</button>
      <div class="toast" id="quick-toast"></div>
    </form>
  </div>

  <script>
    const quickAdd = document.getElementById("quick-add");
    const quickModal = document.getElementById("quick-modal");
    const quickOverlay = document.getElementById("quick-overlay");
    const quickForm = document.getElementById("quick-form");
    const quickToast = document.getElementById("quick-toast");

    const openModal = () => {
      quickModal.classList.add("active");
      quickOverlay.classList.add("active");
      document.getElementById("patient-name").focus();
    };

    const closeModal = () => {
      quickModal.classList.remove("active");
      quickOverlay.classList.remove("active");
    };

    quickAdd.addEventListener("click", openModal);
    quickOverlay.addEventListener("click", closeModal);

    quickForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const payload = {
        patient: event.target[0].value.trim(),
        event: event.target[1].value.trim(),
        plan: event.target[2].value.trim(),
        next: event.target[3].value.trim(),
        created_at: new Date().toISOString()
      };
      const saved = JSON.parse(localStorage.getItem("starx_quick_cases") || "[]");
      saved.unshift(payload);
      localStorage.setItem("starx_quick_cases", JSON.stringify(saved.slice(0,10)));
      quickToast.textContent = "Registro guardado";
      setTimeout(() => {
        quickToast.textContent = "";
        closeModal();
        quickForm.reset();
      }, 900);
    });
  </script>
</body>
</html>
