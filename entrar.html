<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | StarX</title>
  <style>
    :root {
      --bg:#04060f;
      --panel:#0c1221;
      --line:rgba(255,255,255,0.08);
      --glow:#38bdf8;
      --text:#f3f6ff;
      --muted:rgba(243,246,255,0.6);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--text);
      font-family:"Space Grotesk","Segoe UI",sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }
    main {
      width:min(960px,100%);
      border:1px solid var(--line);
      border-radius:32px;
      padding:48px;
      background:var(--panel);
      box-shadow:0 40px 120px rgba(0,0,0,0.45);
    }
    h1 { margin:0 0 40px; letter-spacing:0.2rem; text-transform:uppercase; font-size:30px; }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:24px;
    }
    .card {
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px 24px;
      text-decoration:none;
      color:var(--text);
      position:relative;
      overflow:hidden;
      transition:transform 0.25s ease;
    }
    .card::after {
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg,rgba(56,189,248,0.08),transparent 55%);
      opacity:0;
      transition:opacity 0.25s ease;
    }
    .card:hover { transform:translateY(-6px); }
    .card:hover::after { opacity:1; }
    .card h2 { margin:0 0 12px; font-size:22px; letter-spacing:0.1rem; }
    .card p { margin:0; color:var(--muted); font-size:15px; line-height:1.5; }
    .footer { text-align:center; margin-top:40px; }
    .footer a { color:var(--muted); text-decoration:none; letter-spacing:0.2rem; font-size:13px; text-transform:uppercase; }
  </style>
</head>
<body>
  <main>
    <h1>Selecciona portal</h1>
    <section class="grid">
      <a class="card" href="/medico">
        <h2>Portal médico</h2>
        <p>Registrar pacientes, notas clínicas y dashboards Stark Command.</p>
      </a>
      <a class="card" href="/paciente">
        <h2>Portal paciente</h2>
        <p>Registrar síntomas, seguimientos y recibir recordatorios.</p>
      </a>
    </section>
    <div class="footer">
      <a href="/premium">Probar StarX / Premium</a>
    </div>
  </main>
</body>
</html>
