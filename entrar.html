<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel StarX</title>
  <style>
    :root { --bg:#040813; --panel:#0b1323; --line:rgba(255,255,255,0.08); --text:#f2f5ff; --muted:rgba(242,245,255,0.6); --accent:#3dd5ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:"Space Grotesk","Segoe UI",sans-serif; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    main { width:min(900px,100%); border:1px solid var(--line); border-radius:32px; padding:48px; background:var(--panel); box-shadow:0 60px 160px rgba(0,0,0,0.5); }
    h1 { margin:0 0 32px; letter-spacing:0.3rem; text-transform:uppercase; font-size:24px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }
    a.card { border:1px solid var(--line); border-radius:24px; padding:28px; text-decoration:none; color:var(--text); position:relative; background:rgba(5,10,20,0.6); }
    a.card h2 { margin:0 0 10px; letter-spacing:0.2rem; font-size:18px; text-transform:uppercase; }
    a.card p { margin:0; color:var(--muted); font-size:14px; }
    .premium { margin-top:28px; text-align:center; }
    .premium a { color:var(--muted); text-decoration:none; letter-spacing:0.2rem; font-size:12px; text-transform:uppercase; }
  </style>
</head>
<body>
  <main>
    <h1>StarX ▸ Panel principal</h1>
    <section class="grid">
      <a class="card" href="/paciente">
        <h2>Portal paciente</h2>
        <p>Registrar síntomas, ver historial y vincular médico.</p>
      </a>
      <a class="card" href="mailto:contacto.starxmedic@gmail.com?subject=Acceso%20profesional">
        <h2>Solicitar acceso profesional</h2>
        <p>Activa Stark Command si eres personal de salud verificado.</p>
      </a>
      <a class="card" href="/medico">
        <h2>Ingresar portal profesional</h2>
        <p>Disponible para cuentas aprobadas.</p>
      </a>
    </section>
    <div class="premium">
      <a href="/premium">Premium ▸ Escalar StarX</a>
    </div>
  </main>
</body>
</html>
