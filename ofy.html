<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>OFY & Asociados | Smart Accounting</title>
  <style>
    :root { --bg:#030b06; --text:#f6f8f4; --muted:rgba(246,248,244,0.6); --accent1:#1a6b4d; --accent2:#4fb37b; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at top, rgba(79,179,123,0.18), transparent 60%), var(--bg); font-family:"Space Grotesk","Segoe UI",sans-serif; color:var(--text); }
    main { text-align:center; padding:90px 70px; border:1px solid rgba(255,255,255,0.05); border-radius:40px; background:rgba(3,11,6,0.85); box-shadow:0 0 200px rgba(26,107,77,0.25); position:relative; overflow:hidden; }
    .symbol { width:160px; height:160px; margin:0 auto 36px; position:relative; display:flex; align-items:center; justify-content:center; color:#061225; font-size:58px; letter-spacing:0.4rem; font-weight:600; text-transform:uppercase; animation:float 7s ease-in-out infinite, spin 40s linear infinite; transform-style:preserve-3d; }
    .symbol::before { content:""; position:absolute; inset:0; border-radius:24px; background:linear-gradient(135deg, rgba(26,107,77,0.95), rgba(79,179,123,0.65)); box-shadow:0 18px 60px rgba(26,107,77,0.35); transform:translateZ(-16px); }
    .symbol::after { content:""; position:absolute; inset:14px; border-radius:16px; background:rgba(6,16,10,0.92); box-shadow:inset 0 0 35px rgba(79,179,123,0.35); transform:translateZ(24px); }
    @keyframes float { 0%,100% { transform:translateY(-5px); } 50% { transform:translateY(5px); } }
    @keyframes spin { 0% { transform:rotateX(0deg) rotateY(0deg); } 100% { transform:rotateX(360deg) rotateY(360deg); } }
    h1 { margin:0; font-size:30px; letter-spacing:0.35rem; text-transform:uppercase; font-weight:400; }
    .subtitle { margin:10px 0 28px; font-size:15px; letter-spacing:0.25rem; color:var(--muted); }
    .status { margin:24px auto 20px; display:flex; justify-content:center; }
    .status .dot { width:10px; height:10px; border-radius:50%; background:#7ae1a4; box-shadow:0 0 12px rgba(122,225,164,0.85); animation:pulseDot 3.6s ease-in-out infinite; }
    @keyframes pulseDot { 0%,100% { transform:scale(0.9); box-shadow:0 0 6px rgba(143,224,194,0.4); } 50% { transform:scale(1.15); box-shadow:0 0 16px rgba(143,224,194,1); } }
    a { text-decoration:none; display:inline-flex; padding:16px 40px; border-radius:999px; background:linear-gradient(120deg, var(--accent1), var(--accent2)); color:#04170f; text-transform:uppercase; letter-spacing:0.25rem; font-weight:600; font-size:14px; margin-top:10px; }
    .footer { margin-top:38px; font-size:11px; letter-spacing:0.3rem; text-transform:uppercase; color:rgba(245,247,251,0.35); }
  </style>
</head>
<body>
  <main>
    <div class="symbol"><span>FC</span></div>
    <h1>Farfan Cielo &amp; Asociados</h1>
    <div class="subtitle">Smart Accounting</div>
    <div class="subtitle">Tus números, claros. Tus decisiones, seguras.</div>
    <div class="status"><span class="dot"></span></div>
    <a href="/ofy-login.html">Ingresar</a>
    <div class="footer">Impulsado por tecnología StarX</div>
  </main>
</body>
</html>
