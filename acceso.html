<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | StarX</title>
  <style>
    :root { --bg:#030814; --panel:#0c1222; --line:rgba(255,255,255,0.08); --text:#f2f5ff; --muted:rgba(242,245,255,0.6); --accent:#3dd5ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:"Space Grotesk","Segoe UI",sans-serif; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    main { width: min(420px,100%); border:1px solid var(--line); border-radius:28px; padding:40px 36px; background:var(--panel); box-shadow:0 40px 150px rgba(0,0,0,0.45); }
    h1 { margin:0 0 24px; text-transform:uppercase; letter-spacing:0.35rem; font-size:20px; }
    label { display:block; font-size:12px; letter-spacing:0.2rem; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    input { width:100%; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:18px; background:#050a18; color:var(--text); font-size:15px; }
    button { width:100%; border:none; border-radius:999px; padding:14px; background:linear-gradient(120deg,rgba(61,213,255,0.95),rgba(14,165,233,0.95)); color:#01040b; text-transform:uppercase; letter-spacing:0.2rem; font-size:13px; font-weight:600; cursor:pointer; }
    .links { margin-top:20px; display:flex; flex-direction:column; gap:6px; }
    .links a { color:var(--muted); text-decoration:none; font-size:13px; letter-spacing:0.1rem; text-transform:uppercase; }
    .google { margin-top:24px; width:100%; border:1px solid var(--line); border-radius:999px; padding:12px; background:transparent; color:var(--muted); text-transform:uppercase; letter-spacing:0.15rem; font-size:12px; cursor:not-allowed; }
    .google span { font-size:11px; display:block; margin-top:4px; }
  </style>
</head>
<body>
  <main>
    <h1>Acceso StarX</h1>
    <form>
      <label for="email">Correo</label>
      <input id="email" type="email" placeholder="usuario@starx.com" required />
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" required />
      <button type="submit">Iniciar sesión</button>
    </form>
    <div class="links">
      <a href="/registro">Crear usuario</a>
      <a href="#">Olvidé mi contraseña</a>
    </div>
    <button class="google" type="button">Acceso con Google (próximo paso)<span>Documentado: habilitar OAuth</span></button>
  </main>
</body>
</html>
