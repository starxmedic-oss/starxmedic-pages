<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <title>Acceso | StarX Medic</title>
  <style>
    :root { --bg:#030814; --panel:#0c1222; --line:rgba(255,255,255,0.08); --text:#f2f5ff; --muted:rgba(242,245,255,0.6); --accent:#3dd5ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:"Space Grotesk","Segoe UI",sans-serif; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    main { width: min(420px,100%); border:1px solid var(--line); border-radius:28px; padding:40px 36px; background:var(--panel); box-shadow:0 40px 150px rgba(0,0,0,0.45); text-align:center; }
    h1 { margin:0 0 24px; text-transform:uppercase; letter-spacing:0.35rem; font-size:20px; }
    label { display:block; font-size:12px; letter-spacing:0.2rem; text-transform:uppercase; color:var(--muted); margin-bottom:6px; text-align:left; }
    input { width:100%; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:18px; background:#050a18; color:var(--text); font-size:15px; }
    button { width:100%; border:none; border-radius:999px; padding:14px; background:linear-gradient(120deg,rgba(61,213,255,0.95),rgba(14,165,233,0.95)); color:#01040b; text-transform:uppercase; letter-spacing:0.2rem; font-size:13px; font-weight:600; cursor:pointer; box-shadow:0 12px 30px rgba(61,213,255,0.25); }
    .status-text { margin-top:12px; font-size:13px; letter-spacing:0.1rem; text-transform:uppercase; color:var(--muted); min-height:18px; }
    .signup { margin-top:18px; font-size:13px; letter-spacing:0.15rem; text-transform:uppercase; }
    .signup a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <main>
    <h1>StarX Medic</h1>
    <form id="login-form">
      <label for="email">Correo</label>
      <input id="email" type="email" placeholder="usuario@starx.com" required />
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" required />
      <button type="submit">Iniciar sesión</button>
      <div id="login-status" class="status-text"></div>
    </form>
    <div class="signup">¿Aún no tienes cuenta? <a href="/acceso.html">Crear cuenta gratis</a></div>
  </main>
  <script>
    const API_BASE = "https://api.starxmedic.com";
    const loginForm = document.getElementById("login-form");
    const statusEl = document.getElementById("login-status");

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "Autenticando…";
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: loginForm.email.value.trim(),
            password: loginForm.password.value
          })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err?.message || "Credenciales inválidas");
        }
        const data = await res.json();
        localStorage.setItem("starx_token", data.token);
        if (data.user) {
          localStorage.setItem("starx_profile", JSON.stringify(data.user));
        }
        window.location.href = "/app.html";
      } catch (error) {
        statusEl.textContent = error.message || "No se pudo iniciar sesión";
      }
    });
  </script>
  <script src="/cta.js" defer></script>
</body>
</html>
